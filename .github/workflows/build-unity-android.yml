name: Build Unity Android APK & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**/*.cs', 'ProjectSettings/ProjectSettings.txt') }}
          restore-keys: |
            Library-Android-
            Library-

      # Build Android APK using Game-CI
      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          buildName: FarmEmpireTycoon
          projectPath: .

      # Upload compiled APK as artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FarmEmpireTycoon-APK
          path: build/Android/FarmEmpireTycoon.apk

      # Create GitHub Release when pushing tags (e.g. v1.0)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Android/FarmEmpireTycoon.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
